services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - infra

  glean-server:
    image: ${GLEAN_IMAGE:-glean-base}
    build:
      context: ${GLEAN_DOCKER_PATH:-/Users/jack/Code/withakay/glean-docker}/base
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      - glean-server
      - --db-root
      - /data/glean/db
      - --schema
      - ${GLEAN_SCHEMA_DIR:-/opt/glean/schema/source}
      - --port
      - "12345"
    ports:
      - "12345:12345"
    volumes:
      - glean_db:/data/glean/db
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/localhost/12345"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

  glass-server:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      glean-server:
        condition: service_healthy
    command: ["python", "/app/server.py", "--port", "12346"]
    ports:
      - "12346:12346"
    volumes:
      - ./glass-stub:/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',12346),1); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/localhost/11434"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

volumes:
  qdrant_storage:
  glean_db:
  ollama_data:

networks:
  infra:
    name: code-context-infra
