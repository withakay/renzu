services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - infra

  glean-server:
    build:
      context: ${GLEAN_DOCKER_PATH:-/Users/jack/Code/withakay/glean-docker}
      dockerfile: Dockerfile
    container_name: glean-server
    restart: unless-stopped
    command:
      [
        "glean-server",
        "--db-root",
        "/data/glean/db",
        "--schema",
        "/data/glean/schema/source",
        "--port",
        "12345",
      ]
    ports:
      - "12345:12345"
    volumes:
      - glean_db:/data/glean/db
      - ${GLEAN_SCHEMA_PATH:-./data/glean/schema}:/data/glean/schema:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 12345"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

  glass-server:
    build:
      context: ${GLEAN_DOCKER_PATH:-/Users/jack/Code/withakay/glean-docker}
      dockerfile: Dockerfile
    container_name: glass-server
    restart: unless-stopped
    depends_on:
      glean-server:
        condition: service_healthy
    command: ["glass-server", "--service", "glean-server:12345", "--port", "12346"]
    ports:
      - "12346:12346"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 12346"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 11434"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks:
      - infra

volumes:
  qdrant_storage:
  glean_db:
  ollama_data:

networks:
  infra:
    name: code-context-infra
